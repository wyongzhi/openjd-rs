name: openjd-for-js

on:
  push:
    branches: [mainline]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/wasm-bindgen
            ~/.cargo/registry
            target
          key: wasm-${{ hashFiles('Cargo.lock') }}

      - name: Install wasm-bindgen-cli
        run: which wasm-bindgen || cargo install wasm-bindgen-cli --version 0.2.117

      - name: Build WASM
        run: cargo build --target wasm32-unknown-unknown -p openjd-for-js --release

      - name: Generate JS bindings
        run: wasm-bindgen --target web --out-dir pkg target/wasm32-unknown-unknown/release/openjd_for_js.wasm

      - name: Run JS tests
        run: cd js && npm install && npx vitest run
